name: Tester

on:
  push:
    branches: [main, 'auto/**']
    paths-ignore:
      - '**.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    name: Bygg og test
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6

      - name: Sett opp JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Bygg og kjør tester
        run: ./gradlew build test --no-daemon

      - name: Last opp testrapport
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-rapport
          path: build/reports/tests/test/
          retention-days: 30

      - name: Publiser testresultater
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: JUnit Tester
          path: build/test-results/test/*.xml
          reporter: java-junit
